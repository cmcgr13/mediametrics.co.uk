    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-elevated: #111118; --bg-card: #16161f; --bg-subtle: #1c1c28;
            --text-primary: #e8e6e1; --text-secondary: #9a9890; --text-muted: #5c5a55;
            --accent: #3ecf8e; --accent-dim: rgba(62,207,142,0.12); --accent-glow: rgba(62,207,142,0.06);
            --border: rgba(62,207,142,0.08);
            --serif: 'PT Serif', Georgia, serif; --sans: 'PT Sans', -apple-system, sans-serif;
        }
        html { scroll-behavior: smooth; overflow-x: hidden; }
        body { font-family: var(--sans); background: var(--bg-primary); color: var(--text-secondary); line-height: 1.7; font-size: 16px; -webkit-font-smoothing: antialiased; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 1.25rem 2rem; display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); transition: padding 0.3s ease; }
        nav.scrolled { padding: 0.75rem 2rem; }
        .nav-logo { display: flex; align-items: center; position: relative; height: 48px; text-decoration: none; }
        .logo-full { height: 42px; width: auto; opacity: 1; transition: opacity 0.3s ease; }
        .logo-icon { height: 34px; width: auto; position: absolute; left: 0; opacity: 0; transition: opacity 0.3s ease; }
        nav.scrolled .logo-full { opacity: 0; pointer-events: none; }
        nav.scrolled .logo-icon { opacity: 1; }
        .nav-right { display: flex; align-items: center; gap: 1.5rem; }
        .nav-link { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); text-decoration: none; transition: color 0.3s ease; }
        .nav-link:hover, .nav-link.active { color: var(--text-primary); }
        .nav-cta { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); text-decoration: none; padding: 0.5rem 1.25rem; border: 1px solid rgba(62,207,142,0.3); border-radius: 2px; transition: all 0.3s ease; }
        .nav-cta:hover { background: var(--accent); color: var(--bg-primary); }

        main { flex: 1; padding-top: 7rem; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 2rem 5rem; }
        .page-label { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
        h1 { font-family: var(--serif); font-weight: 400; font-size: clamp(2.2rem, 5vw, 3.2rem); line-height: 1.2; color: var(--text-primary); margin-bottom: 0.75rem; }
        .page-sub { font-size: 1.05rem; line-height: 1.8; color: var(--text-secondary); max-width: 560px; }

        .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 3rem 0; }

        .empty-state { padding: 3rem 0; }
        .empty-state p { font-size: 0.95rem; color: var(--text-muted); font-style: italic; }

        /* Future post card grid — ready to populate */
        .posts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-top: 2.5rem; }

        footer { padding: 1.75rem 2rem; border-top: 1px solid var(--border); text-align: center; }
        footer p { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.05em; }
        footer a { font-size: 0.75rem; color: var(--text-muted); text-decoration: none; border-bottom: 1px solid rgba(92,90,85,0.4); transition: color 0.3s, border-color 0.3s; }
        footer a:hover { color: var(--accent); border-bottom-color: var(--accent); }

        @media (max-width: 768px) {
            .container { padding: 0 1.5rem 3.5rem; }
            .posts-grid { grid-template-columns: 1fr; }
            nav { padding: 1rem 1.5rem; }
        }
        @media (max-width: 480px) {
            main { padding-top: 6rem; }
            .nav-right { gap: 1rem; }
        }
    </style>
</head>
